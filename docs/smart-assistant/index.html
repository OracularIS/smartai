<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Assistant Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Smart Assistant Documentation">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  <link rel="stylesheet" href="../sidebar.css" />
  <link rel="stylesheet" href="./smart-assistant.css" />
  <link rel="stylesheet" href="//unpkg.com/docsify-accordion/src/style.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Smart Assistant',
      repo: '',
      homepage: 'overview.md',
      coverpage: true,
      search: 'auto',
      loadSidebar: true,
      subMaxLevel: 4,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Type to search',
        depth: 6,
        hideOtherSidebarContent: false,
        namespace: 'smart-assistant',
      },
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            document.querySelectorAll('.sidebar-nav li').forEach(function(item) {
              item.addEventListener('click', function(event) {
                const target = event.target;
                if (target.nodeName=='UL') {
                  event.stopPropagation();
                }
              });
            });
            document.body.addEventListener('click', function(event) {
              const sidebar = document.querySelector('.sidebar-nav');
              if (sidebar && !sidebar.contains(event.target)) {
                event.stopPropagation();
              }
            });
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//unpkg.com/docsify-accordion/src/index.js"></script>
</body>
</html>
